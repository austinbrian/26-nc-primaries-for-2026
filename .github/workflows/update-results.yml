name: Update Election Results

on:
  workflow_dispatch:
  schedule:
    # Every 15 minutes on election night (March 3, 2026)
    - cron: '*/15 * * * *'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch NCSBE results
        run: python update_results.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json
          git diff --staged --quiet || git commit -m "Update election results $(date -u '+%Y-%m-%d %H:%M UTC')" && git push
